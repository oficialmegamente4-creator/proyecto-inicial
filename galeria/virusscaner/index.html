<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Virus Total API</title>
</head>

<body>

    <div class="container">
        <h1>VirusTotal Scaner</h1>

        <section>
            <h2>Scan a URL</h2>
            <input type="text" id="urlInput" placeholder="Enter URL (e.g., https://example.com)">
            <button onclick="scanURL()">Scan URl</button>
        </section>

        <section>
            <h2>Scan a File</h2>
            <input type="file" id="fileInput">
            <button onclick="scanfile()">Scan File</button>
        </section>

        <div id="result"></div>

        <div id="fullReportModal" class="modal">
            <div class="modal content">
                <samp class="close" onclick="closeModal()">&times;</samp>
                <h2>Full Report</h2>
                <div id="fullReportContent"></div>
            </div>
        </div>

    </div>


    <script src="script-2.js"></script>
</body>

</html>
